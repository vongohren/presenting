<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presenting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 600px; }
    h1 { font-size: 2rem; margin-bottom: 1rem; color: #d4a853; }
    p { color: #888; margin-bottom: 2rem; }
    ul { list-style: none; }
    li { margin-bottom: 0.75rem; }
    a {
      color: #d4a853;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      display: inline-block;
      transition: background 0.2s;
    }
    a:hover { background: #16213e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Presenting</h1>
    <p>Encrypted presentations. Password required.</p>
    <ul>
      <li><a href="blandebatteri-messing/">Blandebatteri i messing</a></li>
    </ul>
  </div>
</body>
</html>
